<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Cyber-themed profile header banner</title>
  <desc>Terminal-style dark banner with matrix-style binary rain, a circuit grid, and an animated typewriter greeting</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#123320" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="200" fill="#060a06"/>
  <rect width="800" height="200" fill="url(#grid)"/>

  <g fill="#164a2b" font-family="'Courier New', monospace" font-size="13" opacity="0.8">
    <text x="20" y="20">01001</text>
    <text x="90" y="35">11010</text>
    <text x="20" y="185">10110</text>
    <text x="700" y="20">10011</text>
    <text x="620" y="35">01101</text>
    <text x="720" y="185">00110</text>
    <text x="660" y="170">11001</text>
    <text x="40" y="165">01011</text>
  </g>

  <g stroke="#1f5c34" stroke-width="1">
    <line x1="60" y1="40" x2="150" y2="70"/>
    <line x1="150" y1="70" x2="120" y2="140"/>
    <line x1="150" y1="70" x2="230" y2="50"/>
    <line x1="230" y1="50" x2="300" y2="100"/>
    <line x1="120" y1="140" x2="60" y2="170"/>
    <line x1="620" y1="30" x2="700" y2="60"/>
    <line x1="700" y1="60" x2="760" y2="30"/>
    <line x1="700" y1="60" x2="670" y2="130"/>
    <line x1="670" y1="130" x2="740" y2="160"/>
    <line x1="620" y1="30" x2="560" y2="70"/>
  </g>
  <g fill="#39d353">
    <circle cx="60" cy="40" r="4"/>
    <circle cx="150" cy="70" r="4"/>
    <circle cx="120" cy="140" r="4"/>
    <circle cx="230" cy="50" r="4"/>
    <circle cx="300" cy="100" r="4"/>
    <circle cx="60" cy="170" r="4"/>
    <circle cx="620" cy="30" r="4"/>
    <circle cx="700" cy="60" r="4"/>
    <circle cx="760" cy="30" r="4"/>
    <circle cx="670" cy="130" r="4"/>
    <circle cx="740" cy="160" r="4"/>
    <circle cx="560" cy="70" r="4"/>
  </g>

  <rect x="10" y="10" width="780" height="180" fill="none" stroke="#39d353" stroke-width="1.5" opacity="0.6"/>
  <g fill="#0d1a10">
    <circle cx="30" cy="30" r="6" fill="#e2453c"/>
    <circle cx="50" cy="30" r="6" fill="#e8c547"/>
    <circle cx="70" cy="30" r="6" fill="#39d353"/>
  </g>
  <text x="90" y="35" font-family="'Courier New', monospace" font-size="13" fill="#3a8a55">user@secure-shell: ~</text>
  <line x1="10" y1="46" x2="790" y2="46" stroke="#1f5c34" stroke-width="1"/>

  <text x="60" y="125" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="#39d353">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0s" fill="freeze"/>
    <tspan>&gt; Hi there! I'm </tspan><tspan fill="#39d353">Mounika</tspan>
  </text>

  <rect id="caret" x="60" y="92" width="3" height="40" fill="#39d353">
    <animate attributeName="opacity" values="1;1;0;0" dur="0.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 552,0; 552,0; 0,0"
      keyTimes="0; 0.3; 0.95; 1"
      dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
